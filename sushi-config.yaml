id: fiji.core.ig                                                                  # a unique identifier for this IG - you will need to update ig.ini with
packageId: fiji.core.ig                                                           # the packageId must match the id above
canonical: https://healthinfoservices.net/fiji-core-ig                            # the canonical URL for this IG ideally with a domain you control
version: 1.0.0                                                                       # the version of this IG - update as needed
name: FijiCoreIG                                                                  # computer-readable name without spaces
title: Fiji Core FHIR Implementation Guide                                             # title of the IG
description: FHIR Implementation Guide with Profiles for healthcare interoperability in Fiji   # this will show as the description of the IG
status: draft # draft | active | retired | unknown

# update these as required
copyrightYear: 2026
releaseLabel: ci-build # ci-build | draft | qa-preview | ballot | trial-use | release | update | normative+trial-use
license: MIT

# this is where you can change the menu structure of the IG
menu:
  Home: index.html
  Artifacts: artifacts.html

# leave these settings as is unless you know what you're doing and have a reason to change them
fhirVersion: 4.3.0
instanceOptions:
  manualSliceOrdering: true

dependencies:
  pacific.base.ig: 1.0.0